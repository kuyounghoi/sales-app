<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><title>아이콘 생성</title></head>
<body>
<h2>아이콘 생성 중... 잠시 기다리세요</h2>
<p id="msg">PNG 파일 2개가 자동으로 다운로드됩니다.</p>
<script>
function makeIcon(size) {
  const c = document.createElement('canvas');
  c.width = size; c.height = size;
  const ctx = c.getContext('2d');

  // 둥근 배경
  const r = size * 0.18;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = '#1D9E75';
  ctx.fill();

  // 마이크 아이콘
  const cx = size / 2, cy = size / 2;
  const mw = size * 0.14, mh = size * 0.26, mt = cy - mh * 0.55;

  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  // 마이크 몸통
  const rx = mw / 2;
  ctx.beginPath();
  ctx.moveTo(cx - rx, mt + rx);
  ctx.lineTo(cx - rx, mt + mh - rx);
  ctx.quadraticCurveTo(cx - rx, mt + mh, cx, mt + mh);
  ctx.quadraticCurveTo(cx + rx, mt + mh, cx + rx, mt + mh - rx);
  ctx.lineTo(cx + rx, mt + rx);
  ctx.quadraticCurveTo(cx + rx, mt, cx, mt);
  ctx.quadraticCurveTo(cx - rx, mt, cx - rx, mt + rx);
  ctx.fill();

  // 마이크 받침
  const arcR = mw * 1.4;
  ctx.beginPath();
  ctx.arc(cx, mt + mh - rx, arcR, Math.PI, 0);
  ctx.strokeStyle = 'rgba(255,255,255,0.9)';
  ctx.lineWidth = size * 0.04;
  ctx.stroke();

  // 스탠드
  ctx.beginPath();
  ctx.moveTo(cx, mt + mh - rx + arcR);
  ctx.lineTo(cx, cy + mh * 0.55);
  ctx.moveTo(cx - mw * 0.7, cy + mh * 0.55);
  ctx.lineTo(cx + mw * 0.7, cy + mh * 0.55);
  ctx.stroke();

  // 텍스트
  ctx.fillStyle = 'white';
  ctx.font = `bold ${size * 0.1}px "Apple SD Gothic Neo", "Malgun Gothic", sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('판매장부', cx, size * 0.85);

  return c.toDataURL('image/png');
}

function download(dataURL, name) {
  const a = document.createElement('a');
  a.href = dataURL;
  a.download = name;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

window.onload = function() {
  setTimeout(() => {
    download(makeIcon(192), 'icon-192.png');
    setTimeout(() => {
      download(makeIcon(512), 'icon-512.png');
      document.getElementById('msg').innerHTML =
        '✅ <b>icon-192.png</b>, <b>icon-512.png</b> 다운로드 완료!<br><br>' +
        '다음 단계: <a href="https://github.com/kuyounghoi/sales-app/upload/main" target="_blank">GitHub에 두 파일 업로드</a>';
    }, 800);
  }, 500);
};
</script>
</body>
</html>
